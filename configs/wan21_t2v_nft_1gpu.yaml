# Wan2.1-T2V-1.3B NFT LoRA - Single H200 GPU (143GB) with ClearML
# Based on examples/nft/lora/wan21_t2v.yaml

# Environment Configuration
launcher: "accelerate"
config_file: null
num_processes: 1
main_process_port: 29500
mixed_precision: "bf16"

run_name: null
project: "Flow-Factory"
logging_backend: "clearml"

# Data Configuration
data:
  dataset_dir: "dataset/pickscore"
  preprocessing_batch_size: 32
  dataloader_num_workers: 8
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1000

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 128
  lora_alpha: 128
  target_components: 'transformer'
  target_modules: "default"
  model_name_or_path: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
  model_type: "wan2_t2v"
  resume_path: null
  resume_type: null

log:
  save_dir: "~/flow-factory-output"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  # Trainer settings
  trainer_type: 'nft'
  advantage_aggregation: 'gdpo'
  nft_beta: 0.1
  # `Old` Policy settings
  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"
  # Training Timestep distribution
  num_train_timesteps: 4
  time_sampling_strategy: discrete
  time_shift: 3.0
  timestep_range: 0.9
  # KL div
  kl_type: 'v-based'
  kl_beta: 0
  ref_param_device: 'cuda'
  # Clipping
  clip_range: 1.0e-4
  adv_clip_range: 5.0

  # Sampling Settings
  resolution: [480, 832]
  condition_image_size: [480, 832]
  num_frames: 1
  num_inference_steps: 12
  guidance_scale: 5.0

  # Batch and sampling
  per_device_batch_size: 24
  group_size: 16
  global_std: false
  unique_sample_num_per_epoch: 48
  gradient_step_per_epoch: 1

  # Optimization
  seed: 42
  learning_rate: 1.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # Gradient checkpointing
  enable_gradient_checkpointing: true

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"

# Evaluation settings
eval:
  resolution: [480, 832]
  num_frames: 41
  per_device_batch_size: 1
  guidance_scale: 5.0
  num_inference_steps: 20
  eval_freq: 0
  seed: 42

# Reward Model Configuration
rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16

# Optional Evaluation Reward Models
eval_rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 64
    device: "cuda"
    dtype: bfloat16
